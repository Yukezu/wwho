<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>404 — Louie Tan</title>
  <meta name="description" content="This page got lost." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="dark light" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/sections.css" />
  <link rel="stylesheet" href="css/utilities.css" />

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .error-wrap {
      text-align: center;
      max-width: 32rem;
    }
    .error-code {
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }
    .error-sub {
      margin-top: 1rem;
      font-size: 1.125rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .error-actions {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .error-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      height: 44px;
      padding: 0 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      background: var(--secondary);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: background var(--transition), transform var(--transition);
      text-decoration: none;
    }
    .error-back:hover {
      background: var(--border);
      transform: translateY(-1px);
    }
    .error-back svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <main class="error-wrap">
    <p class="error-code">404</p>
    <p class="error-sub">This page got lost — like me, most days.</p>
    <div class="error-actions">
      <a href="/" class="error-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back home
      </a>
    </div>
  </main>

  <!-- Theme: respect saved preference + OS preference -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var html = document.documentElement;
        if (saved === 'dark' || saved === 'light') {
          html.classList.remove('dark', 'light');
          html.classList.add(saved);
        } else {
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          html.classList.remove('dark', 'light');
          html.classList.add(prefersLight ? 'light' : 'dark');
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
